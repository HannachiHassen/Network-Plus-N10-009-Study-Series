<svg viewBox="0 0 600 440" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect width="600" height="440" fill="#FAFAF8"/>
  <rect x="0" y="0" width="600" height="4" fill="#0A5C36"/>

  <text x="300" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0A5C36" letter-spacing="0.5">Token Ring Topology</text>
  <text x="300" y="56" text-anchor="middle" font-size="11" fill="#888" letter-spacing="1">IEEE 802.5  —  TOKEN PASSING CONTROLS TRANSMISSION</text>

  <!-- Logical ring: 6 nodes in a circle around 300,245, r=145 -->
  <!-- Positions: top 300,100  TR 426,172  BR 426,318  bottom 300,390  BL 174,318  TL 174,172 -->

  <!-- Ring arrows (curved arcs between consecutive nodes, clockwise) -->
  <!-- Use path with arrowheads to show direction -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A5C36"/>
    </marker>
    <marker id="token-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#EF9F27"/>
    </marker>
  </defs>

  <!-- Ring segments (clockwise arcs) -->
  <!-- top -> TR -->
  <path d="M 318,107 Q 390,120 418,165" fill="none" stroke="#0A5C36" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- TR -> BR -->
  <path d="M 430,192 Q 442,245 428,316" fill="none" stroke="#0A5C36" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- BR -> bottom -->
  <path d="M 415,333 Q 385,380 316,386" fill="none" stroke="#0A5C36" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- bottom -> BL -->
  <path d="M 283,386 Q 215,380 182,336" fill="none" stroke="#0A5C36" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- BL -> TL -->
  <path d="M 170,316 Q 158,245 172,172" fill="none" stroke="#0A5C36" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- TL -> top -->
  <path d="M 182,155 Q 212,110 282,103" fill="none" stroke="#0A5C36" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dashed inner ring to show MAU concept -->
  <circle cx="300" cy="245" r="58" fill="none" stroke="#BAD9C5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="300" y="237" text-anchor="middle" font-size="10" fill="#0A5C36" font-weight="700">MAU</text>
  <text x="300" y="250" text-anchor="middle" font-size="9" fill="#0A5C36">Multistation</text>
  <text x="300" y="263" text-anchor="middle" font-size="9" fill="#0A5C36">Access Unit</text>

  <!-- Node circles -->
  <circle cx="300" cy="100" r="22" fill="#0A5C36" stroke="#fff" stroke-width="2"/>
  <text x="300" y="104" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">Node 1</text>

  <circle cx="426" cy="172" r="22" fill="#0A5C36" stroke="#fff" stroke-width="2"/>
  <text x="426" y="176" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">Node 2</text>

  <circle cx="426" cy="318" r="22" fill="#0A5C36" stroke="#fff" stroke-width="2"/>
  <text x="426" y="322" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">Node 3</text>

  <circle cx="300" cy="390" r="22" fill="#0A5C36" stroke="#fff" stroke-width="2"/>
  <text x="300" y="394" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">Node 4</text>

  <circle cx="174" cy="318" r="22" fill="#0A5C36" stroke="#fff" stroke-width="2"/>
  <text x="174" y="322" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">Node 5</text>

  <!-- Node 6 highlighted (has token) -->
  <circle cx="174" cy="172" r="22" fill="#EF9F27" stroke="#fff" stroke-width="2"/>
  <text x="174" y="168" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">Node 6</text>
  <text x="174" y="180" text-anchor="middle" font-size="8" fill="#fff">TX</text>

  <!-- Token symbol near node 6 -->
  <rect x="88" y="148" width="62" height="26" rx="6" fill="#FFF8E7" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="119" y="158" text-anchor="middle" font-size="9" fill="#BA7517" font-weight="700">TOKEN</text>
  <text x="119" y="168" text-anchor="middle" font-size="8" fill="#BA7517">held here</text>
  <line x1="150" y1="163" x2="155" y2="165" stroke="#EF9F27" stroke-width="1.5"/>

  <!-- Key note -->
  <rect x="420" y="60" width="162" height="56" rx="6" fill="#E8F4EE" stroke="#0A5C36" stroke-width="1"/>
  <text x="501" y="76" text-anchor="middle" font-size="10" fill="#0A5C36" font-weight="700">Token Passing Rule</text>
  <text x="501" y="89" text-anchor="middle" font-size="9" fill="#555">Only the node holding</text>
  <text x="501" y="101" text-anchor="middle" font-size="9" fill="#555">the token may transmit</text>
  <text x="501" y="112" text-anchor="middle" font-size="9" fill="#555">→ no collisions</text>

  <!-- Legend -->
  <circle cx="36" cy="424" r="7" fill="#EF9F27"/>
  <text x="48" y="428" font-size="10" fill="#888">Active transmitter (holds token)</text>
  <circle cx="250" cy="424" r="7" fill="#0A5C36"/>
  <text x="262" y="428" font-size="10" fill="#888">Idle node</text>
  <line x1="340" y1="424" x2="360" y2="424" stroke="#0A5C36" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="368" y="428" font-size="10" fill="#888">Data flow direction</text>
</svg>
