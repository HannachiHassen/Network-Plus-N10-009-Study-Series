<svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect width="600" height="420" fill="#FAFAF8"/>
  <rect x="0" y="0" width="600" height="4" fill="#0A5C36"/>

  <text x="300" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0A5C36" letter-spacing="0.5">Star / Hub-and-Spoke Topology</text>
  <text x="300" y="56" text-anchor="middle" font-size="11" fill="#888" letter-spacing="1">ALL TRAFFIC FLOWS THROUGH THE CENTRAL SWITCH</text>

  <!-- Center switch -->
  <!-- Spokes to 8 endpoints arranged in circle r=150 around center 300,230 -->
  <!-- Angles: 0,45,90,135,180,225,270,315 -->

  <!-- Lines first (behind nodes) -->
  <line x1="300" y1="230" x2="450" y2="230" stroke="#B0D4BF" stroke-width="2"/>
  <line x1="300" y1="230" x2="406" y2="124" stroke="#B0D4BF" stroke-width="2"/>
  <line x1="300" y1="230" x2="300" y2="80"  stroke="#B0D4BF" stroke-width="2"/>
  <line x1="300" y1="230" x2="194" y2="124" stroke="#B0D4BF" stroke-width="2"/>
  <line x1="300" y1="230" x2="150" y2="230" stroke="#B0D4BF" stroke-width="2"/>
  <line x1="300" y1="230" x2="194" y2="336" stroke="#B0D4BF" stroke-width="2"/>
  <line x1="300" y1="230" x2="300" y2="380" stroke="#B0D4BF" stroke-width="2"/>
  <line x1="300" y1="230" x2="406" y2="336" stroke="#B0D4BF" stroke-width="2"/>

  <!-- Central switch -->
  <rect x="264" y="194" width="72" height="72" rx="10" fill="#0A5C36" stroke="#fff" stroke-width="2"/>
  <text x="300" y="224" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">SWITCH</text>
  <text x="300" y="238" text-anchor="middle" font-size="9" fill="#BAD9C5">Central Node</text>
  <text x="300" y="252" text-anchor="middle" font-size="9" fill="#E8F4EE">★ Hub</text>

  <!-- Endpoint nodes -->
  <circle cx="450" cy="230" r="18" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="450" y="234" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">PC</text>

  <circle cx="406" cy="124" r="18" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="406" y="128" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">PC</text>

  <circle cx="300" cy="80" r="18" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="300" y="84" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">SRV</text>

  <circle cx="194" cy="124" r="18" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="194" y="128" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">PC</text>

  <circle cx="150" cy="230" r="18" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="150" y="234" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">PC</text>

  <circle cx="194" cy="336" r="18" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="194" y="340" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">PRN</text>

  <circle cx="300" cy="380" r="18" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="300" y="384" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">PC</text>

  <circle cx="406" cy="336" r="18" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="406" y="340" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">PC</text>

  <!-- SPOF label -->
  <line x1="338" y1="194" x2="380" y2="160" stroke="#E24B4A" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="382" y="143" width="130" height="22" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
  <text x="447" y="158" text-anchor="middle" font-size="10" fill="#A32D2D" font-weight="700">Single Point of Failure</text>

  <!-- Legend -->
  <rect x="30" y="395" width="12" height="12" rx="3" fill="#0A5C36"/>
  <text x="48" y="405" font-size="10" fill="#888">Central switch/hub</text>
  <circle cx="175" cy="401" r="6" fill="#1D9E75"/>
  <text x="187" y="405" font-size="10" fill="#888">End device (PC, server, printer)</text>
</svg>
