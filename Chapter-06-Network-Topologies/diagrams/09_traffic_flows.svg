<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect width="700" height="500" fill="#FAFAF8"/>
  <rect x="0" y="0" width="700" height="4" fill="#0A5C36"/>

  <text x="350" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0A5C36" letter-spacing="0.5">Network Traffic Flows</text>
  <text x="350" y="56" text-anchor="middle" font-size="11" fill="#888" letter-spacing="1">UNDERSTANDING WHERE TRAFFIC GOES</text>

  <defs>
    <marker id="ns-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A5C36"/>
    </marker>
    <marker id="ew-arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#EF9F27"/>
    </marker>
    <marker id="ew-arrow2-l" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L8,3 z" fill="#EF9F27"/>
    </marker>
    <marker id="mc-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#185FA5"/>
    </marker>
    <marker id="bc-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A32D2D"/>
    </marker>
    <marker id="ac-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#854F0B"/>
    </marker>
  </defs>

  <!-- DATA CENTER BOX -->
  <rect x="220" y="80" width="260" height="220" rx="10" fill="#F0EDE8" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="350" y="98" text-anchor="middle" font-size="10" fill="#888" font-weight="700">DATA CENTER</text>

  <!-- Servers inside DC -->
  <rect x="250" y="108" width="60" height="40" rx="6" fill="#0A5C36"/>
  <text x="280" y="124" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">Server</text>
  <text x="280" y="136" text-anchor="middle" font-size="8" fill="#BAD9C5">App A</text>

  <rect x="325" y="108" width="60" height="40" rx="6" fill="#0A5C36"/>
  <text x="355" y="124" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">Server</text>
  <text x="355" y="136" text-anchor="middle" font-size="8" fill="#BAD9C5">App B</text>

  <rect x="400" y="108" width="60" height="40" rx="6" fill="#0A5C36"/>
  <text x="430" y="124" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">Server</text>
  <text x="430" y="136" text-anchor="middle" font-size="8" fill="#BAD9C5">DB</text>

  <!-- EAST-WEST arrows between servers -->
  <line x1="310" y1="128" x2="325" y2="128" stroke="#EF9F27" stroke-width="2" marker-end="url(#ew-arrow2)"/>
  <line x1="385" y1="128" x2="400" y2="128" stroke="#EF9F27" stroke-width="2" marker-end="url(#ew-arrow2)"/>
  <line x1="325" y1="138" x2="310" y2="138" stroke="#EF9F27" stroke-width="2" marker-end="url(#ew-arrow2)"/>
  <line x1="400" y1="138" x2="385" y2="138" stroke="#EF9F27" stroke-width="2" marker-end="url(#ew-arrow2)"/>

  <!-- East-West label inside DC -->
  <rect x="235" y="162" width="230" height="20" rx="4" fill="#FFF8E7" stroke="#EF9F27" stroke-width="1"/>
  <text x="350" y="176" text-anchor="middle" font-size="9" fill="#BA7517" font-weight="700">East-West: server-to-server (VM, microservices)</text>

  <!-- Firewall/border in DC -->
  <rect x="310" y="196" width="80" height="36" rx="6" fill="#444"/>
  <text x="350" y="212" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">Firewall</text>
  <text x="350" y="225" text-anchor="middle" font-size="8" fill="#ccc">Border</text>

  <!-- Internet cloud -->
  <ellipse cx="350" cy="420" rx="70" ry="32" fill="#B5D4F4" stroke="#185FA5" stroke-width="1.5"/>
  <text x="350" y="416" text-anchor="middle" font-size="10" fill="#0C447C" font-weight="700">Internet</text>
  <text x="350" y="430" text-anchor="middle" font-size="9" fill="#185FA5">/ WAN</text>

  <!-- NORTH-SOUTH arrows (firewall <-> internet) -->
  <line x1="350" y1="232" x2="350" y2="385" stroke="#0A5C36" stroke-width="2.5" marker-end="url(#ns-arrow)"/>
  <line x1="338" y1="385" x2="338" y2="232" stroke="#0A5C36" stroke-width="2.5" marker-end="url(#ns-arrow)"/>
  <rect x="362" y="295" width="108" height="20" rx="4" fill="#E8F4EE" stroke="#0A5C36" stroke-width="1"/>
  <text x="416" y="309" text-anchor="middle" font-size="9" fill="#0A5C36" font-weight="700">North-South Traffic</text>
  <text x="416" y="325" text-anchor="middle" font-size="8" fill="#555">Client ↔ Internet/DC</text>

  <!-- UNICAST section left -->
  <rect x="30" y="190" width="150" height="90" rx="8" fill="#fff" stroke="#0A5C36" stroke-width="1"/>
  <text x="105" y="208" text-anchor="middle" font-size="10" fill="#0A5C36" font-weight="700">Unicast</text>
  <circle cx="60" cy="240" r="14" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="60" y="244" text-anchor="middle" font-size="8" fill="#fff">Src</text>
  <circle cx="150" cy="240" r="14" fill="#888" stroke="#fff" stroke-width="1.5"/>
  <text x="150" y="244" text-anchor="middle" font-size="8" fill="#fff">Dst</text>
  <line x1="74" y1="240" x2="136" y2="240" stroke="#0A5C36" stroke-width="1.8" marker-end="url(#ns-arrow)"/>
  <text x="105" y="268" text-anchor="middle" font-size="8" fill="#555">1 source → 1 destination</text>

  <!-- MULTICAST section right -->
  <rect x="520" y="80" width="160" height="110" rx="8" fill="#fff" stroke="#185FA5" stroke-width="1"/>
  <text x="600" y="98" text-anchor="middle" font-size="10" fill="#185FA5" font-weight="700">Multicast</text>
  <circle cx="538" cy="148" r="13" fill="#185FA5"/>
  <text x="538" y="152" text-anchor="middle" font-size="7" fill="#fff">Src</text>
  <circle cx="610" cy="120" r="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <text x="610" y="124" text-anchor="middle" font-size="7" fill="#0C447C">G1</text>
  <circle cx="640" cy="148" r="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <text x="640" y="152" text-anchor="middle" font-size="7" fill="#0C447C">G2</text>
  <circle cx="610" cy="176" r="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <text x="610" y="180" text-anchor="middle" font-size="7" fill="#0C447C">G3</text>
  <line x1="551" y1="142" x2="600" y2="122" stroke="#185FA5" stroke-width="1.4" marker-end="url(#mc-arrow)"/>
  <line x1="551" y1="148" x2="630" y2="148" stroke="#185FA5" stroke-width="1.4" marker-end="url(#mc-arrow)"/>
  <line x1="551" y1="154" x2="600" y2="173" stroke="#185FA5" stroke-width="1.4" marker-end="url(#mc-arrow)"/>
  <text x="600" y="195" text-anchor="middle" font-size="8" fill="#555">1 src → subscribed group</text>

  <!-- BROADCAST section right lower -->
  <rect x="520" y="210" width="160" height="100" rx="8" fill="#fff" stroke="#A32D2D" stroke-width="1"/>
  <text x="600" y="228" text-anchor="middle" font-size="10" fill="#A32D2D" font-weight="700">Broadcast</text>
  <circle cx="538" cy="268" r="13" fill="#A32D2D"/>
  <text x="538" y="272" text-anchor="middle" font-size="7" fill="#fff">Src</text>
  <circle cx="600" cy="250" r="8" fill="#F7C1C1" stroke="#A32D2D" stroke-width="1"/>
  <text x="600" y="254" text-anchor="middle" font-size="6" fill="#A32D2D">All</text>
  <circle cx="632" cy="268" r="8" fill="#F7C1C1" stroke="#A32D2D" stroke-width="1"/>
  <text x="632" y="272" text-anchor="middle" font-size="6" fill="#A32D2D">All</text>
  <circle cx="600" cy="285" r="8" fill="#F7C1C1" stroke="#A32D2D" stroke-width="1"/>
  <text x="600" y="289" text-anchor="middle" font-size="6" fill="#A32D2D">All</text>
  <line x1="551" y1="262" x2="592" y2="252" stroke="#A32D2D" stroke-width="1.4" marker-end="url(#bc-arrow)"/>
  <line x1="551" y1="268" x2="624" y2="268" stroke="#A32D2D" stroke-width="1.4" marker-end="url(#bc-arrow)"/>
  <line x1="551" y1="274" x2="592" y2="283" stroke="#A32D2D" stroke-width="1.4" marker-end="url(#bc-arrow)"/>
  <text x="600" y="302" text-anchor="middle" font-size="8" fill="#555">1 src → all in domain</text>

  <!-- ANYCAST section bottom left -->
  <rect x="30" y="320" width="160" height="110" rx="8" fill="#fff" stroke="#854F0B" stroke-width="1"/>
  <text x="110" y="338" text-anchor="middle" font-size="10" fill="#854F0B" font-weight="700">Anycast</text>
  <text x="110" y="352" text-anchor="middle" font-size="8" fill="#555">Same IP, nearest server</text>
  <circle cx="50" cy="395" r="13" fill="#BA7517"/>
  <text x="50" y="399" text-anchor="middle" font-size="7" fill="#fff">Client</text>
  <circle cx="130" cy="365" r="10" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="130" y="369" text-anchor="middle" font-size="6" fill="#633806">NYC</text>
  <circle cx="160" cy="395" r="10" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="160" y="399" text-anchor="middle" font-size="6" fill="#633806">LON</text>
  <circle cx="130" cy="420" r="10" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="130" y="424" text-anchor="middle" font-size="6" fill="#633806">SIN</text>
  <line x1="63" y1="388" x2="120" y2="368" stroke="#EF9F27" stroke-width="2.5" marker-end="url(#ac-arrow)"/>
  <line x1="63" y1="395" x2="150" y2="395" stroke="#BA7517" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ac-arrow)"/>
  <line x1="63" y1="400" x2="120" y2="418" stroke="#BA7517" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ac-arrow)"/>
  <text x="80" y="370" font-size="7" fill="#854F0B" font-weight="700">→ nearest</text>

  <!-- Legend row -->
  <line x1="30" y1="482" x2="50" y2="482" stroke="#0A5C36" stroke-width="2.5"/>
  <text x="56" y="486" font-size="9" fill="#888">North-South</text>
  <line x1="150" y1="482" x2="170" y2="482" stroke="#EF9F27" stroke-width="2"/>
  <text x="176" y="486" font-size="9" fill="#888">East-West</text>
  <line x1="248" y1="482" x2="268" y2="482" stroke="#185FA5" stroke-width="1.5"/>
  <text x="274" y="486" font-size="9" fill="#888">Multicast</text>
  <line x1="340" y1="482" x2="360" y2="482" stroke="#A32D2D" stroke-width="1.5"/>
  <text x="366" y="486" font-size="9" fill="#888">Broadcast</text>
  <line x1="440" y1="482" x2="460" y2="482" stroke="#BA7517" stroke-width="2.5"/>
  <text x="466" y="486" font-size="9" fill="#888">Anycast (nearest)</text>
</svg>
