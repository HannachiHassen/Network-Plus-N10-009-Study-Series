<svg viewBox="0 0 660 460" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect width="660" height="460" fill="#FAFAF8"/>
  <rect x="0" y="0" width="660" height="4" fill="#0A5C36"/>

  <text x="330" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0A5C36" letter-spacing="0.5">Hybrid Topology</text>
  <text x="330" y="56" text-anchor="middle" font-size="11" fill="#888" letter-spacing="1">COMBINATION OF TWO OR MORE TOPOLOGY TYPES</text>

  <!-- Three star clusters connected by a bus backbone -->

  <!-- BUS BACKBONE -->
  <line x1="80" y1="240" x2="580" y2="240" stroke="#333" stroke-width="3"/>
  <rect x="60" y="228" width="20" height="24" rx="3" fill="#444"/>
  <rect x="580" y="228" width="20" height="24" rx="3" fill="#444"/>
  <text x="330" y="233" text-anchor="middle" font-size="10" fill="#fff" font-weight="700" style="background:#333">BACKBONE BUS</text>
  <rect x="258" y="223" width="144" height="16" rx="3" fill="#333"/>
  <text x="330" y="234" text-anchor="middle" font-size="9" fill="#fff">Backbone Bus</text>

  <!-- Tap points on bus -->
  <circle cx="170" cy="240" r="5" fill="#0A5C36"/>
  <circle cx="330" cy="240" r="5" fill="#0A5C36"/>
  <circle cx="490" cy="240" r="5" fill="#0A5C36"/>

  <!-- STAR CLUSTER 1 (left, above) -->
  <line x1="170" y1="240" x2="170" y2="162" stroke="#B0D4BF" stroke-width="1.5"/>
  <rect x="148" y="140" width="44" height="32" rx="6" fill="#0A5C36"/>
  <text x="170" y="158" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">SW-1</text>
  <line x1="170" y1="140" x2="110" y2="90" stroke="#B0D4BF" stroke-width="1.5"/>
  <line x1="170" y1="140" x2="170" y2="76" stroke="#B0D4BF" stroke-width="1.5"/>
  <line x1="170" y1="140" x2="230" y2="90" stroke="#B0D4BF" stroke-width="1.5"/>
  <circle cx="110" cy="82" r="14" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="110" y="86" text-anchor="middle" font-size="8" fill="#fff">PC</text>
  <circle cx="170" cy="68" r="14" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="170" y="72" text-anchor="middle" font-size="8" fill="#fff">PC</text>
  <circle cx="230" cy="82" r="14" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="230" y="86" text-anchor="middle" font-size="8" fill="#fff">PC</text>
  <!-- Star 1 label -->
  <rect x="100" y="32" width="140" height="20" rx="4" fill="#E8F4EE" stroke="#0A5C36" stroke-width="1"/>
  <text x="170" y="45" text-anchor="middle" font-size="9" fill="#0A5C36" font-weight="700">Star Cluster — Site A</text>

  <!-- STAR CLUSTER 2 (center, below) -->
  <line x1="330" y1="240" x2="330" y2="310" stroke="#B0D4BF" stroke-width="1.5"/>
  <rect x="308" y="310" width="44" height="32" rx="6" fill="#0A5C36"/>
  <text x="330" y="328" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">SW-2</text>
  <line x1="330" y1="342" x2="270" y2="392" stroke="#B0D4BF" stroke-width="1.5"/>
  <line x1="330" y1="342" x2="330" y2="402" stroke="#B0D4BF" stroke-width="1.5"/>
  <line x1="330" y1="342" x2="390" y2="392" stroke="#B0D4BF" stroke-width="1.5"/>
  <circle cx="270" cy="400" r="14" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="270" y="404" text-anchor="middle" font-size="8" fill="#fff">PC</text>
  <circle cx="330" cy="414" r="14" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="330" y="418" text-anchor="middle" font-size="8" fill="#fff">SRV</text>
  <circle cx="390" cy="400" r="14" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="390" y="404" text-anchor="middle" font-size="8" fill="#fff">PC</text>
  <rect x="257" y="432" width="148" height="20" rx="4" fill="#E8F4EE" stroke="#0A5C36" stroke-width="1"/>
  <text x="330" y="446" text-anchor="middle" font-size="9" fill="#0A5C36" font-weight="700">Star Cluster — Site B</text>

  <!-- STAR CLUSTER 3 (right, above) -->
  <line x1="490" y1="240" x2="490" y2="162" stroke="#B0D4BF" stroke-width="1.5"/>
  <rect x="468" y="140" width="44" height="32" rx="6" fill="#0A5C36"/>
  <text x="490" y="158" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">SW-3</text>
  <line x1="490" y1="140" x2="430" y2="90" stroke="#B0D4BF" stroke-width="1.5"/>
  <line x1="490" y1="140" x2="490" y2="76" stroke="#B0D4BF" stroke-width="1.5"/>
  <line x1="490" y1="140" x2="550" y2="90" stroke="#B0D4BF" stroke-width="1.5"/>
  <circle cx="430" cy="82" r="14" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="430" y="86" text-anchor="middle" font-size="8" fill="#fff">PC</text>
  <circle cx="490" cy="68" r="14" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="490" y="72" text-anchor="middle" font-size="8" fill="#fff">PRN</text>
  <circle cx="550" cy="82" r="14" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>
  <text x="550" y="86" text-anchor="middle" font-size="8" fill="#fff">PC</text>
  <rect x="420" y="32" width="140" height="20" rx="4" fill="#E8F4EE" stroke="#0A5C36" stroke-width="1"/>
  <text x="490" y="45" text-anchor="middle" font-size="9" fill="#0A5C36" font-weight="700">Star Cluster — Site C</text>

  <!-- Topology labels on diagram -->
  <text x="594" y="236" font-size="9" fill="#555" font-style="italic">Bus</text>
  <text x="594" y="247" font-size="9" fill="#555" font-style="italic">backbone</text>

  <!-- Legend -->
  <rect x="28" y="395" width="12" height="12" rx="3" fill="#0A5C36"/>
  <text x="46" y="405" font-size="10" fill="#888">Switch (star hub)</text>
  <circle cx="152" cy="401" r="6" fill="#1D9E75"/>
  <text x="164" y="405" font-size="10" fill="#888">End device</text>
  <line x1="248" y1="401" x2="278" y2="401" stroke="#333" stroke-width="3"/>
  <text x="285" y="405" font-size="10" fill="#888">Shared bus backbone</text>
</svg>
