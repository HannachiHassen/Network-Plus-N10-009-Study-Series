<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#1a1a1a">OSI Model — 7 Layers</text>
  <text x="340" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Open Systems Interconnection Reference Model</text>

  <!-- Encapsulation arrow (left) -->
  <line x1="44" y1="88" x2="44" y2="548" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="28" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888" transform="rotate(-90,28,320)">Encapsulation (sending)</text>

  <!-- De-encapsulation arrow (right) -->
  <line x1="636" y1="548" x2="636" y2="88" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="652" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888" transform="rotate(90,652,320)">De-encapsulation (receiving)</text>

  <!-- LAYER 7 — Application -->
  <rect x="60" y="76" width="560" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <rect x="60" y="76" width="56" height="64" rx="0" fill="#185FA5" opacity="0.12"/>
  <text x="88" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#185FA5">7</text>
  <text x="290" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#0C447C">Application</text>
  <text x="290" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#185FA5">HTTP, HTTPS, DNS, DHCP, FTP, SMTP, SNMP, SSH</text>
  <!-- PDU badge -->
  <rect x="490" y="90" width="60" height="22" rx="11" fill="#185FA5" opacity="0.15"/>
  <text x="520" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#0C447C">Data</text>
  <text x="568" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#378ADD">PDU</text>
  <!-- Device -->
  <text x="590" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#378ADD">Host layer</text>

  <!-- LAYER 6 — Presentation -->
  <rect x="60" y="148" width="560" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <rect x="60" y="148" width="56" height="64" rx="0" fill="#185FA5" opacity="0.12"/>
  <text x="88" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#185FA5">6</text>
  <text x="290" y="174" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#0C447C">Presentation</text>
  <text x="290" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#185FA5">SSL/TLS, JPEG, ASCII, Encryption, Compression</text>
  <rect x="490" y="162" width="60" height="22" rx="11" fill="#185FA5" opacity="0.15"/>
  <text x="520" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#0C447C">Data</text>
  <text x="568" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#378ADD">PDU</text>
  <text x="590" y="194" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#378ADD">Host layer</text>

  <!-- LAYER 5 — Session -->
  <rect x="60" y="220" width="560" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <rect x="60" y="220" width="56" height="64" rx="0" fill="#185FA5" opacity="0.12"/>
  <text x="88" y="257" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#185FA5">5</text>
  <text x="290" y="246" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#0C447C">Session</text>
  <text x="290" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#185FA5">NetBIOS, RPC, SIP — Establishes &amp; terminates sessions</text>
  <rect x="490" y="234" width="60" height="22" rx="11" fill="#185FA5" opacity="0.15"/>
  <text x="520" y="249" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#0C447C">Data</text>
  <text x="568" y="249" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#378ADD">PDU</text>
  <text x="590" y="266" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#378ADD">Host layer</text>

  <!-- LAYER 4 — Transport -->
  <rect x="60" y="292" width="560" height="64" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <rect x="60" y="292" width="56" height="64" rx="0" fill="#3B6D11" opacity="0.12"/>
  <text x="88" y="329" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#3B6D11">4</text>
  <text x="290" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#27500A">Transport</text>
  <text x="290" y="336" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3B6D11">TCP, UDP — Segmentation, flow control, error recovery</text>
  <rect x="468" y="306" width="80" height="22" rx="11" fill="#3B6D11" opacity="0.15"/>
  <text x="508" y="321" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#27500A">Segment</text>
  <text x="568" y="321" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#639922">PDU</text>
  <text x="586" y="346" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#639922">Firewall</text>

  <!-- LAYER 3 — Network -->
  <rect x="60" y="364" width="560" height="64" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <rect x="60" y="364" width="56" height="64" rx="0" fill="#854F0B" opacity="0.12"/>
  <text x="88" y="401" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#854F0B">3</text>
  <text x="290" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#633806">Network</text>
  <text x="290" y="408" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#854F0B">IP, ICMP, ARP, OSPF, BGP — Logical addressing &amp; routing</text>
  <rect x="475" y="378" width="66" height="22" rx="11" fill="#854F0B" opacity="0.15"/>
  <text x="508" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#633806">Packet</text>
  <text x="568" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#BA7517">PDU</text>
  <text x="586" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#BA7517">Router / L3 SW</text>

  <!-- LAYER 2 — Data Link -->
  <rect x="60" y="436" width="560" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <rect x="60" y="436" width="56" height="64" rx="0" fill="#993C1D" opacity="0.12"/>
  <text x="88" y="473" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#993C1D">2</text>
  <text x="290" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#712B13">Data Link</text>
  <text x="290" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#993C1D">Ethernet, 802.11, PPP — MAC addressing, framing, FCS</text>
  <rect x="477" y="450" width="62" height="22" rx="11" fill="#993C1D" opacity="0.15"/>
  <text x="508" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#712B13">Frame</text>
  <text x="568" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D85A30">PDU</text>
  <text x="586" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D85A30">Switch / Bridge</text>

  <!-- LAYER 1 — Physical -->
  <rect x="60" y="508" width="560" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <rect x="60" y="508" width="56" height="64" rx="0" fill="#5F5E5A" opacity="0.12"/>
  <text x="88" y="545" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#5F5E5A">1</text>
  <text x="290" y="534" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#444441">Physical</text>
  <text x="290" y="552" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5F5E5A">Cables, signals, voltages, connectors, bits on the wire</text>
  <rect x="487" y="522" width="44" height="22" rx="11" fill="#5F5E5A" opacity="0.15"/>
  <text x="509" y="537" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#444441">Bit</text>
  <text x="568" y="537" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888780">PDU</text>
  <text x="586" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888780">Hub / Repeater</text>

  <!-- Mnemonic -->
  <text x="340" y="598" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#999">
    Mnemonic (top → bottom): All People Seem To Need Data Processing
  </text>
</svg>
